<div class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-logo">
            OC<span>Studio</span>
        </div>
        <h2>Zaloguj się</h2>
        <p class="auth-subtitle">Witaj z powrotem! Podaj swoje dane.</p>

        <form action="/login" method="POST" class="auth-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="twoj@email.com" required>
            </div>
            
            <div class="input-group">
                <label>Hasło</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="auth-options">
                <label class="checkbox-container">
                    <input type="checkbox"> Zapamiętaj mnie
                </label>
                <a href="#">Zapomniałeś hasła?</a>
            </div>

            <button type="submit" class="auth-btn">Zaloguj się</button>
        </form>

        <p class="auth-footer">
            Nie masz konta? <a href="/register">Zarejestruj się za darmo</a>
        </p>
    </div>
</div>
