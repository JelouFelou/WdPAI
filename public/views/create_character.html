<?php if(isset($character) && $character->getIdTemplate()): ?>
<input type="hidden" id="character-template-id" value="<?= $character->getIdTemplate(); ?>">
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const templateIdInput = document.getElementById('character-template-id');
        if (templateIdInput && templateIdInput.value) {
            const selectElement = document.getElementById('template-select');
            if (selectElement) {
                selectElement.value = templateIdInput.value;
                if (typeof loadTemplateFields === 'function') {
                    loadTemplateFields(templateIdInput.value);
                }
            }
        }

        const imageInput = document.getElementById('profile-image-upload');
        const imagePreview = document.getElementById('profile-img-preview');
        if (imageInput && imagePreview) {
            imageInput.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (evt) {
                        imagePreview.src = evt.target.result;
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
    });
</script>
<?php endif; ?>

<?php if(isset($characterFieldValues)): ?>
<script>
