    window.characterFieldValues = <?= json_encode($characterFieldValues); ?>;
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // --- Podgląd zdjęcia profilowego ---
    const imageInput   = document.getElementById('profile-image-upload');
    const imagePreview = document.getElementById('profile-img-preview');
    if (imageInput && imagePreview) {
        imageInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = evt => { imagePreview.src = evt.target.result; };
                reader.readAsDataURL(file);
            }
        });
    }

    // --- Auto-ładowanie pól przy edycji ---
    // form-template-id jest już wypełniony przez PHP (wartość z bazy),
    // więc wystarczy go odczytać i załadować pola.
    const formTemplateId = document.getElementById('form-template-id');
    const selectEl       = document.getElementById('template-select');

    if (formTemplateId && formTemplateId.value) {
        // Upewnij się, że select też pokazuje właściwą opcję
        if (selectEl) selectEl.value = formTemplateId.value;

        // Załaduj pola – characterFieldValues jest już ustawione przez PHP powyżej
        if (typeof loadTemplateFields === 'function') {
            loadTemplateFields(formTemplateId.value);
        }
    }
});
</script>
