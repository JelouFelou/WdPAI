<div class="template-container">
    <header class="template-header">
        <div class="header-info">
            <h1>
                <?= isset($character) ? 'Edycja Postaci' : 'Kreator Postaci' ?>
            </h1>
            <p>Wprowadź dane i zapisz swoją postać.</p>
        </div>
        <div class="header-actions">

        </div>
    </header>

    <form id="character-form"
        action="<?= isset($character) ? '/editCharacter?id='.$character->getId() : '/createCharacter' ?>" method="POST">

        <section class="template-meta">
            <div class="input-group">
                <label>Wybierz schemat postaci</label>
                <select name="template_id" id="template-select" required onchange="loadTemplateFields(this.value)">
                    <option value="" disabled selected>-- Wybierz schemat --</option>
                    <?php if(isset($templates) && !empty($templates)): ?>
                        <?php foreach($templates as $template): ?>
                            <option value="<?= $template->getId(); ?>" <?= (isset($character) && $character->getIdTemplate() == $template->getId()) ? 'selected' : ''; ?>>
                                <?= htmlspecialchars($template->getName()); ?>
                            </option>
                        <?php endforeach; ?>
                    <?php endif; ?>
                </select>
            </div>

            <div class="input-group">
                <label>Nazwa postaci</label>
                <input type="text" name="character_name"
                    value="<?= isset($character) ? htmlspecialchars($character->getName()) : '' ?>"
                    placeholder="np. Alysia Thorne" required>
            </div>

            <div class="input-group">
                <label>Opis postaci</label>
                <textarea name="character_description"
                    placeholder="Wpisz opis..."><?= isset($character) ? htmlspecialchars($character->getDescription()) : '' ?></textarea>
            </div>

        <div class="template-sections" style="display: flex; gap: 20px; margin-top: 20px;">
            <div style="flex: 1; background: #fff; padding: 20px; border-radius: 10px;">
                <h3>Treść / Główne informacje</h3>
                <div id="left-fields-container" style="display: flex; flex-direction: column; gap: 10px;"></div>
            </div>

            <div style="flex: 1; background: #fff; padding: 20px; border-radius: 10px;">
                <h3>Infobox / Cechy</h3>
                <div id="right-fields-container" style="display: flex; flex-direction: column; gap: 10px;"></div>
            </div>
        </div>
    </form>
</div>

<script src="public/scripts/character_creator.js"></script>

<?php if(isset($character) && $character->getIdTemplate()): ?>
    <input type="hidden" id="character-template-id" value="<?= $character->getIdTemplate(); ?>">
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const templateIdInput = document.getElementById('character-template-id');
            if (templateIdInput && templateIdInput.value) {
                const selectElement = document.getElementById('template-select');
                if (selectElement) {
                    selectElement.value = templateIdInput.value;
                }
                loadTemplateFields(templateIdInput.value);
            }
        });
    </script>
<?php endif; ?>

<?php if(isset($characterFieldValues)): ?>
    <script>
        window.characterFieldValues = <?= json_encode($characterFieldValues); ?>;
    </script>
<?php endif; ?>
