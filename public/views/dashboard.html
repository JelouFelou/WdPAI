    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const slider = document.getElementById('column-slider');
            const columnText = document.getElementById('column-count');

            function adjustSliderLimits() {
                const width = window.innerWidth;

                if (width < 800) {
                    slider.max = 3; // Na małym oknie max 3 kolumny
                    if (slider.value > 3) slider.value = 3;
                } else if (width < 1200) {
                    slider.max = 6; // Na średnim oknie max 6
                } else {
                    slider.max = 10; // Pełna szerokość
                }

                // Wywołaj aktualizację grida z nową wartością
                document.documentElement.style.setProperty('--grid-columns', slider.value);
                columnText.innerText = slider.value;
            }

            // Sprawdzaj przy starcie i przy każdej zmianie rozmiaru okna
            window.addEventListener('resize', adjustSliderLimits);
            adjustSliderLimits();

            // Twoja istniejąca logika suwaka...
            slider.addEventListener('input', function () {
                columnText.innerText = this.value;
                document.documentElement.style.setProperty('--grid-columns', this.value);
                localStorage.setItem('dashboard-columns', this.value);
            });
        });
    </script>
