<script>
document.addEventListener('DOMContentLoaded', () => {
    const range = document.getElementById('settings-columns');
    const value = document.getElementById('settings-columns-value');
    if (!range || !value) return;
    range.addEventListener('input', () => { value.textContent = range.value; });
});
</script>
